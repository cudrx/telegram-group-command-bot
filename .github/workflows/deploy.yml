name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/test-chatbot" >> "$GITHUB_OUTPUT"

      - name: Generate deploy metadata
        run: npm run deploy:metadata
        env:
          DEPLOY_METADATA_BEFORE_SHA: ${{ github.event.before }}
          DEPLOY_METADATA_SHA: ${{ github.sha }}
          DEPLOY_METADATA_BRANCH: ${{ github.ref_name }}
          DEPLOY_METADATA_OUTPUT: deploy/generated/deploy-metadata.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy assets
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}/data'"
          scp -P "${{ secrets.DEPLOY_PORT }}" \
            deploy/compose.yml \
            deploy/remote-deploy.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"
          scp -P "${{ secrets.DEPLOY_PORT }}" \
            deploy/generated/deploy-metadata.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/data/deploy-metadata.json"

      - name: Deploy to server
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "chmod +x '${{ secrets.DEPLOY_PATH }}/remote-deploy.sh' && \
            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' \
            IMAGE_TAG='${{ github.sha }}' \
            SERVER_GHCR_USERNAME='${{ secrets.SERVER_GHCR_USERNAME }}' \
            SERVER_GHCR_TOKEN='${{ secrets.SERVER_GHCR_TOKEN }}' \
            bash '${{ secrets.DEPLOY_PATH }}/remote-deploy.sh'"
