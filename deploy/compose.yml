services:
  bot:
    image: ${GHCR_IMAGE:?set GHCR_IMAGE}:${IMAGE_TAG:-latest}
    container_name: telegram-group-command-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SQLITE_PATH: /app/data/bot.sqlite
      PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./data:/app/data
      - ./data/bin/yt-dlp:/usr/local/bin/yt-dlp:ro
      - ./data/bin/ffmpeg:/usr/local/bin/ffmpeg:ro
      - ./data/bin/ffprobe:/usr/local/bin/ffprobe:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
